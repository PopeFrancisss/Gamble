<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Random bs</title>
<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
.bg{position:fixed;inset:0;background:radial-gradient(circle at top,#111,#000 60%);z-index:-1}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;border-bottom:1px solid #222;background:#0a0a0a}
input{background:#111;border:1px solid #333;color:#fff;padding:6px;border-radius:6px}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer}
.loginbtn{background:#e11d48;color:#fff}
.adminbtn{background:#3b82f6;color:#fff}
.resetbtn{background:#ef4444;color:#fff}
.bluebtn{background:#2563eb;color:#fff}
.greenbtn{background:#16a34a;color:#fff}
.container{display:flex;flex-wrap:wrap;gap:10px;padding:15px}
.card{border:1px solid #222;padding:10px;border-radius:10px;width:220px;background:#050505}
.small{color:#aaa;font-size:12px}
.betbox{border:1px solid #222;padding:10px;margin:10px;border-radius:10px;background:#050505}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center}
.modal-content{background:#0a0a0a;padding:20px;border:1px solid #333;border-radius:10px;width:320px}
</style>
</head>
<body>
<div class="bg"></div>

<div class="topbar">
  <div><b>Random bs</b></div>

  <div>
    <input id="u" placeholder="user" />
    <input id="p" type="password" placeholder="pass" />
    <button class="loginbtn" onclick="login()">Login</button>
    <button class="adminbtn" onclick="openCreateBet()" id="createBtn" style="display:none">Create Bet</button>
    <button class="resetbtn" onclick="resetGame()" id="resetBtn" style="display:none">Reset</button>
  </div>
</div>

<div class="container" id="users"></div>

<h3 style="padding-left:15px">Active Bets</h3>
<div id="bets"></div>

<!-- BET POPUP -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="betTitle"></h3>
    <div id="options"></div>
    <input id="betAmt" placeholder="Bet amount" style="width:100%;margin-top:10px" />
    <button class="greenbtn" onclick="placeBet()" style="width:100%;margin-top:10px">Place Bet</button>
  </div>
</div>

<!-- CREATE BET -->
<div class="modal" id="createModal">
  <div class="modal-content">
    <h3>Create Bet</h3>
    <input id="title" placeholder="Title" style="width:100%;margin-bottom:8px" />
    <div id="outcomeBox"></div>
    <button class="bluebtn" onclick="addOutcome()" style="width:100%;margin-top:8px">+ Add Outcome</button>
    <button class="greenbtn" onclick="submitBet()" style="width:100%;margin-top:10px">Create</button>
  </div>
</div>

<!-- WINNER SELECT POPUP -->
<div class="modal" id="winnerModal">
  <div class="modal-content">
    <h3>Select Winner</h3>
    <div id="winnerOptions"></div>
  </div>
</div>

<script>
let data=JSON.parse(localStorage.getItem("data"))||{
  Pope:{pass:"Pope1",money:5000,level:0},
  Zcripts:{pass:"Zcripts2",money:5000,level:0},
  Demonkingss:{pass:"Demonkingss3",money:5000,level:0}
};

let bets=JSON.parse(localStorage.getItem("bets"))||[];
let currentUser=localStorage.getItem("user")||null;

let selectedBet=null;
let selectedOutcome=null;

function save(){
  localStorage.setItem("data",JSON.stringify(data));
  localStorage.setItem("bets",JSON.stringify(bets));
  localStorage.setItem("user",currentUser);
}

function login(){
  const u=document.getElementById("u").value;
  const p=document.getElementById("p").value;

  if(data[u]&&data[u].pass===p){
    currentUser=u;
    if(u==="Pope"){
      document.getElementById("createBtn").style.display="inline-block";
      document.getElementById("resetBtn").style.display="inline-block";
    }
    save();
    render();
    renderBets();
  }else alert("Wrong login");
}

function requireLogin(){
  if(!currentUser){alert("Login first");return false}
  return true;
}

function upgrade(name){
  if(!requireLogin()) return;
  if(currentUser!==name) return alert("Only your account");

  const u=data[name];
  const cost=(u.level+1)*2000;

  if(u.money>=cost){
    u.money-=cost;
    u.level++;
    save();
    render();
  }
}

// CREATE BET
function openCreateBet(){
  if(currentUser!=="Pope") return;
  document.getElementById("createModal").style.display="flex";
  document.getElementById("outcomeBox").innerHTML="";
  document.getElementById("title").value="";
}

function addOutcome(){
  const div=document.createElement("div");
  div.innerHTML=`<input placeholder='Outcome' style='width:100%;margin:5px 0' />`;
  document.getElementById("outcomeBox").appendChild(div);
}

function submitBet(){
  const title=document.getElementById("title").value;
  const inputs=document.querySelectorAll("#outcomeBox input");

  let outcomes=[];
  inputs.forEach(i=>{if(i.value) outcomes.push(i.value)});

  bets.push({title,outcomes,active:true,winner:null,bets:[]});

  document.getElementById("createModal").style.display="none";
  save();
  renderBets();
}

// BETTING
function openBet(i,o){
  if(!requireLogin()) return;

  selectedBet=i;
  selectedOutcome=o;

  document.getElementById("betTitle").innerText=bets[i].title;
  document.getElementById("options").innerText="Selected: "+o;
  document.getElementById("modal").style.display="flex";
}

function placeBet(){
  const amt=parseInt(document.getElementById("betAmt").value);
  if(!amt) return;

  data[currentUser].money-=amt;

  bets[selectedBet].bets.push({user:currentUser,choice:selectedOutcome,amt});

  document.getElementById("modal").style.display="none";
  save();
  render();
}

// WINNER POPUP
let winnerBetIndex=null;

function openWinner(i){
  if(currentUser!=="Pope") return;

  winnerBetIndex=i;
  const b=bets[i];

  const box=document.getElementById("winnerOptions");
  box.innerHTML="";

  b.outcomes.forEach(o=>{
    const btn=document.createElement("button");
    btn.className="bluebtn";
    btn.style.margin="5px";
    btn.innerText=o;
    btn.onclick=()=>setWinner(o);
    box.appendChild(btn);
  });

  document.getElementById("winnerModal").style.display="flex";
}

function setWinner(winner){
  let b=bets[winnerBetIndex];
  b.winner=winner;

  // pool system
  let totalPool=0;
  let winners=[];

  b.bets.forEach(x=>{
    totalPool+=x.amt;
    if(x.choice===winner) winners.push(x);
  });

  let winnerPool=winners.reduce((a,b)=>a+b.amt,0);

  winners.forEach(x=>{
    let share=(x.amt/winnerPool)*totalPool;
    data[x.user].money+=share;
  });

  b.active=false;

  document.getElementById("winnerModal").style.display="none";
  save();
  render();
  renderBets();
}

// RESET
function resetGame(){
  const pass=prompt("Enter reset password");
  if(pass!=="DORG") return alert("Wrong password");

  localStorage.clear();
  location.reload();
}

function renderBets(){
  const c=document.getElementById("bets");
  c.innerHTML="";

  bets.forEach((b,i)=>{
    const div=document.createElement("div");
    div.className="betbox";

    if(b.active){
      div.innerHTML=`<b>${b.title}</b><br>`+
      b.outcomes.map(o=>`<button class='bluebtn' onclick="openBet(${i},'${o}')">${o}</button>`).join(" ")+
      (currentUser==="Pope"?`<br><button class='greenbtn' onclick="openWinner(${i})">Choose Winner</button>`:"");
    }else{
      div.innerHTML=`<b>${b.title}</b> - Winner: ${b.winner}`;
    }

    c.appendChild(div);
  });
}

function render(){
  const c=document.getElementById("users");
  c.innerHTML="";

  Object.keys(data).forEach(n=>{
    const u=data[n];

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h3>${n}</h3>
      <p>$${u.money}</p>
      <p class='small'>Tier ${u.level}</p>
      <button class='bluebtn' onclick="upgrade('${n}')">Upgrade</button>
    `;

    c.appendChild(div);
  });

  save();
}

render();
renderBets();
</script>
</body>
</html>
